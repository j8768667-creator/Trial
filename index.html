<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chord Arranger Pro - Enhanced Patterns</title>
<style>
:root{--bg:#f6f7fb;--panel:#fff;--ink:#1b1f24;--muted:#667085;--accent:#4f46e5;--accent2:#eef2ff;--border:#dfe3ea;--ok:#177245;--err:#a52a2a;--progress-bg:#e5e7eb;--progress-fill:#4f46e5}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:1024px;margin:0 auto;padding:24px}
h1{font-size:clamp(28px,5vw,44px);margin:0 0 8px;display:flex;align-items:center;gap:12px}
.sub{color:var(--muted);margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 8px 30px rgba(16,24,40,.05)}
label{display:block;font-weight:650;margin:12px 0 6px}
input,select,textarea,button{font:inherit}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:#fff}
textarea{min-height:90px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:none;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;transition:transform .1s}
button:active{transform:scale(.96)}
.primary{background:var(--accent);color:#fff}
.secondary{background:var(--accent2);color:var(--accent)}
.danger{background:#dc2626;color:#fff}
.status{margin-top:12px;color:var(--muted);min-height:22px}
.status.ok{color:var(--ok)}
.status.err{color:var(--err)}
.sequence{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;line-height:1.55;white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:14px;min-height:260px;max-height:500px;overflow:auto}
.help{font-size:13px;color:var(--muted);line-height:1.5;margin-top:4px}
.badge{display:inline-block;background:var(--accent2);color:var(--accent);padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700}
.checks{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.checks label{display:flex;align-items:center;gap:6px;margin:0;cursor:pointer}
.checks input{width:auto;cursor:pointer}
.seedrow{display:flex;gap:8px;align-items:stretch}
.seedrow input{flex:1}
.seedrow button{padding:0 16px;white-space:nowrap}
.progress-track{height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width .3s}
@media(max-width:760px){.grid{grid-template-columns:1fr}.wrap{padding:16px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<span class="badge">🎵 Enhanced MIDI Generator</span>
<h1>Chord Arranger Pro <span style="font-size:14px;font-weight:400;color:var(--muted)">v3.0 - New Patterns</span></h1>
<div class="sub">Completely rewritten pattern generators for each genre - sounds distinctly different!</div>
<div class="grid">
<section class="card">
<label for="progressionPreset">🎹 Chord progression preset</label>
<select id="progressionPreset">
<option value="">Load a preset…</option>
<optgroup label="Pop &amp; Rock">
<option data-chords="C | G | Am | F">Axis Progression (I–V–vi–IV)</option>
<option data-chords="C | Am | F | G">50s Doo-Wop</option>
<option data-chords="Am | F | C | G">Minor Pop</option>
<option data-chords="C | F | Am | G">Pop Ballad</option>
</optgroup>
<optgroup label="Jazz">
<option data-chords="Dm7 | G7 | Cmaj7 | Cmaj7">ii–V–I Turnaround</option>
<option data-chords="Am7 | Dm7 | G7 | Cmaj7">Jazz vi–ii–V–I</option>
<option data-chords="Cmaj7 | A7 | Dm7 | G7">Rhythm Changes</option>
</optgroup>
<optgroup label="Blues &amp; Rock">
<option data-chords="E7(4) | A7(2) | E7(2) | B7(1) | A7(1) | E7(1) | B7(1)">12-Bar Blues</option>
<option data-chords="Am7 | Dm7 | Am7 | Em7">Minor Blues</option>
</optgroup>
</select>

<label for="chords">🎵 Chord progression</label>
<textarea id="chords">C | G | Am | F</textarea>
<div class="help">Separate chords with commas, spaces or vertical bars. Add <code>(N)</code> for duration in bars.</div>

<div class="row">
<div><label for="style">🎸 Genre</label><select id="style">
<option value="rock">Rock (Power Chords + Driving)</option>
<option value="pop">Pop (Strumming + Melodic)</option>
<option value="jazz">Jazz (Rich Voicings + Walking)</option>
<option value="blues">Blues (Shuffle + Bends)</option>
<option value="funk">Funk (Syncopated + Groove)</option>
<option value="reggae">Reggae (Offbeat + Sparse)</option>
<option value="house">House (Four-on-floor + Arp)</option>
<option value="ambient">Ambient (Pads + Textures)</option>
</select></div>
<div><label for="tempo">🎚️ Tempo (BPM)</label><input id="tempo" type="number" min="40" max="240" value="120"></div>
</div>

<label for="structure">📋 Song structure</label>
<input id="structure" type="text" value="Intro:4, Verse:8, Chorus:8, Verse:8, Chorus:8, Bridge:4, Chorus:8, Outro:4">

<label for="seed">🎲 Variation seed</label>
<div class="seedrow"><input id="seed" type="number" value="7"><button class="secondary" id="randomize">🎲</button><button class="secondary" id="surpriseMe">✨ Surprise</button></div>

<label>🎚️ Tracks</label>
<div class="checks">
<label><input id="drums" type="checkbox" checked>Drums</label>
<label><input id="bass" type="checkbox" checked>Bass</label>
<label><input id="harmony" type="checkbox" checked>Harmony</label>
<label><input id="lead" type="checkbox" checked>Lead</label>
<label><input id="chordsTrack" type="checkbox" checked>Chords</label>
</div>

<div class="actions">
<button class="primary" id="generate">🎵 Generate</button>
<button class="secondary" id="preview" data-playing="0">▶ Preview</button>
<button class="secondary" id="download">💾 Export MIDI</button>
</div>
<div class="status" id="status">Ready.</div>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</section>
<section class="card">
<label>📊 Arrangement</label>
<div class="sequence" id="output">Press Generate.</div>
<div style="margin-top:8px;font-size:13px;color:var(--muted)" id="stats"></div>
</section>
</div>
</div>
<script>
"use strict";
const PPQ=480,BAR=PPQ*4,NOTE={C:0,D:2,E:4,F:5,G:7,A:9,B:11};

const QUAL={
"":{ints:[0,4,7],minor:false},
m:{ints:[0,3,7],minor:true},
"7":{ints:[0,4,7,10],minor:false},
m7:{ints:[0,3,7,10],minor:true},
maj7:{ints:[0,4,7,11],minor:false},
maj9:{ints:[0,4,7,11,14],minor:false},
"9":{ints:[0,4,7,10,14],minor:false},
m9:{ints:[0,3,7,10,14],minor:true},
sus4:{ints:[0,5,7],minor:false},
dim7:{ints:[0,3,6,9],minor:true},
m7b5:{ints:[0,3,6,10],minor:true}
};

const PRESETS={
rock:{tempo:120,bassProgram:34,harmonyProgram:30,leadProgram:29},
pop:{tempo:110,bassProgram:33,harmonyProgram:4,leadProgram:81},
jazz:{tempo:90,bassProgram:33,harmonyProgram:1,leadProgram:68},
blues:{tempo:100,bassProgram:34,harmonyProgram:29,leadProgram:28},
funk:{tempo:100,bassProgram:36,harmonyProgram:28,leadProgram:65},
reggae:{tempo:80,bassProgram:33,harmonyProgram:16,leadProgram:57},
house:{tempo:124,bassProgram:38,harmonyProgram:89,leadProgram:80},
ambient:{tempo:70,bassProgram:4,harmonyProgram:5,leadProgram:12}
};

let arrangement=null,audioCtx=null,activeNodes=[],previewTimer=null,noiseBuf=null;

function clamp(n,a,b){return Math.max(a,Math.min(b,n))}
function rng32(seed){let a=seed>>>0;return()=>{a+=0x6D2B79F5;let t=a;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function pcOf(s){const m=/^([A-Ga-g])([#b]?)/.exec(s);if(!m)throw Error("Invalid note");return(NOTE[m[1].toUpperCase()]+(m[2]==="#"?1:m[2]==="b"?-1:0)+12)%12}

function parseChord(s){
  const x=s.trim().replace(/\s+/g,"");
  const m=/^([A-Ga-g])([#b]?)([^\/]*)(?:\/([A-Ga-g][#b]?))?$/.exec(x);
  if(!m)throw Error('Cannot understand "'+s+'"');
  let q=m[3]||"";
  if(!(q in QUAL))throw Error('Unsupported quality "'+q+'"');
  const root=pcOf(m[1]+m[2]),def=QUAL[q];
  return{name:x,root,bass:m[4]?pcOf(m[4]):root,ints:def.ints,minor:def.minor};
}

function parseChordToken(tok){
  const dm=/^(.*)\((\d+)\)$/.exec(tok);
  let base=tok,duration=1;
  if(dm){base=dm[1];duration=clamp(+dm[2],1,32)}
  const chord=parseChord(base);
  chord.duration=duration;
  return chord;
}

function parseChords(text){return text.split(/[|,\s]+/).filter(Boolean).map(parseChordToken)}
function parseStructure(text){return text.split(",").map(s=>s.trim()).filter(Boolean).map(p=>{const m=/^(.+?):\s*(\d+)$/.exec(p);if(!m)throw Error("Bad section");return{name:m[1].trim(),bars:+m[2]}})}
function expandStructure(s){const a=[];for(const sec of s)for(let i=0;i<sec.bars;i++)a.push(sec.name);return a}
function expandChordsToBars(chords,totalBars){const a=[];let i=0;while(a.length<totalBars){const ch=chords[i%chords.length],rem=totalBars-a.length,dur=Math.min(ch.duration,rem);for(let k=0;k<dur;k++)a.push(ch);i++}return a}
function classify(n){const l=n.toLowerCase();return{isChorus:l.includes("chorus")||l.includes("drop"),isIntro:l.includes("intro"),isOutro:l.includes("outro"),isBridge:l.includes("bridge")||l.includes("breakdown"),energy:l.includes("chorus")?1:l.includes("verse")?.8:l.includes("bridge")?.6:.7}}
function midiAt(pc,target){let n=Math.round((target-pc)/12)*12+pc;while(n<0)n+=12;while(n>127)n-=12;return n}
function addNote(t,tick,dur,pitch,vel,ch){t.push({tick:Math.max(0,Math.round(tick)),dur:Math.max(24,Math.round(dur)),pitch:clamp(Math.round(pitch),0,127),vel:clamp(Math.round(vel),1,127),channel:ch})}

// ============= COMPLETELY REWRITTEN GENRE PATTERNS =============

function rockTracks(barChords,barSections,rng){
  const drums=[],bass=[],harmony=[],lead=[];
  for(let b=0;b<barChords.length;b++){
    const cls=classify(barSections[b]),ch=barChords[b];
    const root=midiAt(ch.bass,36),fifth=midiAt((ch.root+7)%12,43);
    
    // Drums: Heavy rock beat with fills
    for(let i=0;i<4;i++){
      addNote(drums,b*BAR+i*PPQ,90,36,cls.isChorus?120:105,9);
      if(i%2===0)addNote(drums,b*BAR+i*PPQ+PPQ/2,80,38,110,9);
    }
    // Snare on 2 and 4
    [1,3].forEach(i=>addNote(drums,b*BAR+i*PPQ,80,38,115,9));
    // Hi-hat 16ths with variations
    for(let i=0;i<16;i++){
      if(i%2===0 || cls.isChorus)addNote(drums,b*BAR+i*PPQ/4,30,42,60+(i%4===0?15:0),9);
    }
    // Crash on chorus
    if(cls.isChorus && b%4===0)addNote(drums,b*BAR,120,49,120,9);
    
    // Bass: Root-fifth with occasional passing tones
    for(let i=0;i<4;i++){
      const note = i%2===0 ? root : fifth;
      addNote(bass,b*BAR+i*PPQ,PPQ*0.8,note,90+(i===0?10:0),1);
      if(i%2===1 && cls.isChorus)addNote(bass,b*BAR+i*PPQ+PPQ/2,PPQ*0.4,root+12,85,1);
    }
    
    // Harmony: Power chords with octaves
    const pwr=[midiAt(ch.root,48),midiAt((ch.root+7)%12,55),midiAt(ch.root,60)];
    const hits=cls.isChorus?[0,1,2,3]:[0,2];
    hits.forEach(i=>pwr.forEach(n=>addNote(harmony,b*BAR+i*PPQ,PPQ*0.7,n,80+(i===0?10:0),2)));
    
    // Lead: Pentatonic riffs
    const pent=ch.minor?[0,3,5,7,10]:[0,2,4,7,9];
    for(let i=0;i<4;i++){
      const idx=(i*2+Math.floor(rng()*3))%pent.length;
      const note=midiAt((ch.root+pent[idx])%12,70);
      addNote(lead,b*BAR+i*PPQ,PPQ*0.5,note,85,3);
      if(i%2===0)addNote(lead,b*BAR+i*PPQ+PPQ/4,PPQ*0.3,note+7,75,3);
    }
  }
  return{drums,bass,harmony,lead};
}

function popTracks(barChords,barSections,rng){
  const drums=[],bass=[],harmony=[],lead=[];
  for(let b=0;b<barChords.length;b++){
    const cls=classify(barSections[b]),ch=barChords[b];
    const root=midiAt(ch.bass,38),third=midiAt((ch.root+(ch.minor?3:4))%12,42);
    
    // Drums: Pop beat with ghost notes
    [0,2].forEach(i=>addNote(drums,b*BAR+i*PPQ,70,36,cls.isChorus?105:95,9));
    [1,3].forEach(i=>addNote(drums,b*BAR+i*PPQ,70,38,100,9));
    for(let i=0;i<8;i++){
      const vel=i%2===0?55:45;
      addNote(drums,b*BAR+i*PPQ/2,25,42,vel+(i%4===0?10:0),9);
      if(i%2===1 && rng()>0.7)addNote(drums,b*BAR+i*PPQ/2,20,38,70,9);
    }
    
    // Bass: Simple pattern with anticipation
    [0,1.5,2,3.5].forEach(beat=>{
      const note=beat<2?root:third;
      addNote(bass,b*BAR+beat*PPQ,PPQ*0.5,note,85,1);
    });
    
    // Harmony: Strummed chords
    const notes=ch.ints.map((iv,i)=>midiAt((ch.root+iv)%12,52+i*3));
    const strum=cls.isChorus?[0,0.25,0.5,0.75,1,1.25,1.5,1.75,2,2.25,2.5,2.75,3,3.25,3.5,3.75]:[0,0.5,1,1.5,2,2.5,3,3.5];
    strum.forEach(beat=>notes.forEach((n,i)=>addNote(harmony,b*BAR+beat*PPQ,PPQ*0.15,n,65+(i*5)+(cls.isChorus?20:0),2)));
    
    // Lead: Catchy melodic hooks
    const scale=ch.minor?[0,2,3,5,7,8,10]:[0,2,4,5,7,9,11];
    const rhythm=cls.isChorus?[0,0.5,1,1.5,2.5,3]:[0,1,2.5];
    rhythm.forEach((beat,i)=>{
      const pc=(ch.root+scale[(i*3+Math.floor(rng()*2))%scale.length])%12;
      addNote(lead,b*BAR+beat*PPQ,PPQ*0.6,midiAt(pc,72),80,3);
    });
  }
  return{drums,bass,harmony,lead};
}

function jazzTracks(barChords,barSections,rng){
  const drums=[],bass=[],harmony=[],lead=[];
  for(let b=0;b<barChords.length;b++){
    const cls=classify(barSections[b]),ch=barChords[b];
    const root=midiAt(ch.bass,36);
    
    // Drums: Jazz ride pattern
    for(let i=0;i<8;i++){
      const main=i%2===0?PPQ/4:PPQ/4+10;
      if(i%2===0 || rng()>0.3){
        addNote(drums,b*BAR+i*PPQ/2,main,49,65+(i%4===0?20:0),9);
      }
    }
    [1,3].forEach(i=>addNote(drums,b*BAR+i*PPQ,50,38,80,9));
    if(b%2===0)addNote(drums,b*BAR+2*PPQ,60,36,70,9);
    
    // Bass: Walking bass
    const notes=[root,root+7,root+12,root+5];
    for(let i=0;i<4;i++){
      addNote(bass,b*BAR+i*PPQ,PPQ*0.85,notes[i%notes.length],80+(i===0?10:0),1);
    }
    
    // Harmony: Rich jazz voicings
    const jazzNotes=ch.ints.slice(0,5).map((iv,i)=>midiAt((ch.root+iv)%12,55+i*3));
    if(cls.isChorus){
      [0,2].forEach(beat=>jazzNotes.forEach(n=>addNote(harmony,b*BAR+beat*PPQ,PPQ*1.8,n,70,2)));
    }else{
      jazzNotes.forEach(n=>addNote(harmony,b*BAR,PPQ*3.7,n,60,2));
    }
    
    // Lead: Jazz improvisation
    const scale=ch.minor?[0,2,3,5,7,8,10,11]:[0,2,4,5,7,9,11,12];
    for(let i=0;i<8;i++){
      const idx=(i*3+Math.floor(rng()*3))%scale.length;
      const pc=(ch.root+scale[idx])%12;
      const beat=i/2;
      addNote(lead,b*BAR+beat*PPQ,PPQ*0.3,midiAt(pc,68),75,3);
      if(i%3===0)addNote(lead,b*BAR+beat*PPQ+PPQ/4,PPQ*0.4,midiAt(pc+7,68),70,3);
    }
  }
  return{drums,bass,harmony,lead};
}

function bluesTracks(barChords,barSections,rng){
  const drums=[],bass=[],harmony=[],lead=[];
  for(let b=0;b<barChords.length;b++){
    const cls=classify(barSections[b]),ch=barChords[b];
    const root=midiAt(ch.bass,36),fifth=midiAt((ch.root+7)%12,43);
    
    // Drums: Shuffle beat
    for(let i=0;i<4;i++){
      addNote(drums,b*BAR+i*PPQ,60,36,100,9);
      const offbeat=i*PPQ+PPQ/2;
      addNote(drums,b*BAR+offbeat,40,36,80,9);
      if(i%2===0)addNote(drums,b*BAR+offbeat+PPQ/4,60,38,90,9);
    }
    [1,3].forEach(i=>addNote(drums,b*BAR+i*PPQ,60,38,110,9));
    for(let i=0;i<8;i++)addNote(drums,b*BAR+i*PPQ/2,20,42,50+(i%2?10:0),9);
    
    // Bass: Blues walking
    [0,1,2,3].forEach(i=>{
      const note=i%2===0?root:fifth;
      addNote(bass,b*BAR+i*PPQ,PPQ*0.8,note,85,1);
      if(i===3)addNote(bass,b*BAR+i*PPQ+PPQ/2,PPQ*0.4,root+12,80,1);
    });
    
    // Harmony: Blues shuffle
    const notes=[root,fifth,root+12,fifth+12];
    const shuffle=[0,0.33,0.66,1,1.33,1.66,2,2.33,2.66,3,3.33,3.66];
    shuffle.forEach(beat=>{
      notes.forEach(n=>addNote(harmony,b*BAR+beat*PPQ,PPQ*0.2,n,70,2));
    });
    
    // Lead: Blues licks
    const blueScale=ch.minor?[0,3,5,6,7,10]:[0,3,5,6,7,10];
    for(let i=0;i<6;i++){
      const idx=(i*2+Math.floor(rng()*3))%blueScale.length;
      const pc=(ch.root+blueScale[idx])%12;
      const beat=i/1.5;
      addNote(lead,b*BAR+beat*PPQ,PPQ*0.5,midiAt(pc,70),80,3);
      if(i%2===0)addNote(lead,b*BAR+beat*PPQ+PPQ/3,PPQ*0.3,midiAt((pc+7)%12,70),70,3);
    }
  }
  return{drums,bass,harmony,lead};
}

function funkTracks(barChords,barSections,rng){
  const drums=[],bass=[],harmony=[],lead=[];
  for(let b=0;b<barChords.length;b++){
    const cls=classify(barSections[b]),ch=barChords[b];
    const root=midiAt(ch.bass,34);
    
    // Drums: Funk groove
    [0,1.5,2.5,3.5].forEach(beat=>addNote(drums,b*BAR+beat*PPQ,50,36,100,9));
    [1,3].forEach(i=>addNote(drums,b*BAR+i*PPQ,60,38,105,9));
    for(let i=0;i<16;i++){
      if(i%4!==2 || rng()>0.5)addNote(drums,b*BAR+i*PPQ/4,20,42,40+(i%2?10:0),9);
    }
    if(cls.isChorus)[0.5,2.5].forEach(beat=>addNote(drums,b*BAR+beat*PPQ,30,46,85,9));
    
    // Bass: Syncopated funk
    const hits=cls.isChorus?[0,0.75,1.25,2,2.75,3.25]:[0,1.25,2.75];
    hits.forEach((beat,i)=>{
      const note=i%2===0?root:root+12;
      addNote(bass,b*BAR+beat*PPQ,PPQ*0.2,note,95,1);
    });
    
    // Harmony: Stab chords
    const stab=ch.ints.map((iv,i)=>midiAt((ch.root+iv)%12,50+i*3));
    const stabs=cls.isChorus?[0,0.5,1.5,2,3]:[0,1.5,3];
    stabs.forEach(beat=>stab.forEach(n=>addNote(harmony,b*BAR+beat*PPQ,PPQ*0.15,n,75,2)));
    
    // Lead: Funky riff
    const pent=ch.minor?[0,3,5,7,10]:[0,2,4,7,9];
    for(let i=0;i<8;i++){
      const idx=(i*2+Math.floor(rng()*2))%pent.length;
      const pc=(ch.root+pent[idx])%12;
      const beat=i*0.5;
      addNote(lead,b*BAR+beat*PPQ,PPQ*0.3,midiAt(pc,72),80,3);
    }
  }
  return{drums,bass,harmony,lead};
}

function reggaeTracks(barChords,barSections,rng){
  const drums=[],bass=[],harmony=[],lead=[];
  for(let b=0;b<barChords.length;b++){
    const cls=classify(barSections[b]),ch=barChords[b];
    const root=midiAt(ch.bass,38);
    
    // Drums: One-drop
    [2,3].forEach(i=>addNote(drums,b*BAR+i*PPQ,60,36,90,9));
    addNote(drums,b*BAR+2*PPQ,60,38,95,9);
    for(let i=0;i<4;i++)addNote(drums,b*BAR+(i+0.5)*PPQ,30,42,50,9);
    
    // Bass: Deep reggae
    [0,2].forEach(beat=>addNote(bass,b*BAR+beat*PPQ,PPQ*0.9,root,90,1));
    if(cls.isChorus)[1,3].forEach(beat=>addNote(bass,b*BAR+beat*PPQ,PPQ*0.9,root-5,85,1));
    
    // Harmony: Offbeat skanks
    const skank=ch.ints.map((iv,i)=>midiAt((ch.root+iv)%12,55+i*3));
    [0.5,1.5,2.5,3.5].forEach(beat=>skank.forEach(n=>addNote(harmony,b*BAR+beat*PPQ,PPQ*0.25,n,70+(cls.isChorus?20:0),2)));
    
    // Lead: Melodic lines
    const scale=ch.minor?[0,2,3,5,7,8,10]:[0,2,4,5,7,9,11];
    for(let i=0;i<4;i++){
      const pc=(ch.root+scale[(i*2+Math.floor(rng()*2))%scale.length])%12;
      addNote(lead,b*BAR+(i+0.5)*PPQ,PPQ*0.6,midiAt(pc,68),75,3);
    }
  }
  return{drums,bass,harmony,lead};
}

function houseTracks(barChords,barSections,rng){
  const drums=[],bass=[],harmony=[],lead=[];
  for(let b=0;b<barChords.length;b++){
    const cls=classify(barSections[b]),ch=barChords[b];
    const root=midiAt(ch.bass,36);
    
    // Drums: Four-on-floor
    for(let i=0;i<4;i++){
      addNote(drums,b*BAR+i*PPQ,80,36,110,9);
      if(i%2===0)addNote(drums,b*BAR+i*PPQ+PPQ/2,60,38,95,9);
    }
    for(let i=0;i<16;i++){
      if(i%2===1)addNote(drums,b*BAR+i*PPQ/4,25,42,55,9);
      if(i%4===0 && i>0)addNote(drums,b*BAR+i*PPQ/4,25,46,80,9);
    }
    
    // Bass: Pumping house
    [0,0.5,1,1.5,2,2.5,3,3.5].forEach(beat=>{
      const note=beat<2?root:root+12;
      addNote(bass,b*BAR+beat*PPQ,PPQ*0.35,note,90,1);
    });
    
    // Harmony: Pad chords
    const pad=ch.ints.map((iv,i)=>midiAt((ch.root+iv)%12,55+i*3));
    if(cls.isChorus){
      [0,2].forEach(beat=>pad.forEach(n=>addNote(harmony,b*BAR+beat*PPQ,PPQ*1.8,n,75,2)));
    }else{
      pad.forEach(n=>addNote(harmony,b*BAR,PPQ*3.8,n,65,2));
    }
    
    // Lead: Arpeggios
    const arp=ch.ints.length?ch.ints:[0,4,7];
    for(let i=0;i<16;i++){
      const iv=arp[(i+Math.floor(b/2))%arp.length];
      const note=midiAt((ch.root+iv)%12,72);
      if(i%2===0 || cls.isChorus)addNote(lead,b*BAR+i*PPQ/4,PPQ*0.2,note,70+(i%4===0?15:0),3);
    }
  }
  return{drums,bass,harmony,lead};
}

function ambientTracks(barChords,barSections,rng){
  const drums=[],bass=[],harmony=[],lead=[];
  for(let b=0;b<barChords.length;b++){
    const cls=classify(barSections[b]),ch=barChords[b];
    const root=midiAt(ch.bass,36);
    
    // Drums: Minimal ambient
    if(b%2===0){
      addNote(drums,b*BAR,30,36,40,9);
      addNote(drums,b*BAR+PPQ*2,30,36,35,9);
    }
    for(let i=0;i<4;i++){
      if(i%2===0)addNote(drums,b*BAR+(i+0.5)*PPQ,20,42,30,9);
    }
    
    // Bass: Low drones
    addNote(bass,b*BAR,PPQ*3.8,root,60,1);
    if(cls.isChorus)addNote(bass,b*BAR+PPQ*2,PPQ*1.8,root+12,55,1);
    
    // Harmony: Evolving pads
    const pad=ch.ints.map((iv,i)=>midiAt((ch.root+iv)%12,50+i*4));
    pad.forEach((n,i)=>{
      addNote(harmony,b*BAR,PPQ*3.8,n,45+(i*5),2);
      if(cls.isChorus)addNote(harmony,b*BAR+PPQ*2,PPQ*1.8,n+12,40+(i*5),2);
    });
    
    // Lead: Textural notes
    const scale=ch.minor?[0,2,3,5,7,8,10]:[0,2,4,5,7,9,11];
    for(let i=0;i<6;i++){
      const pc=(ch.root+scale[(i*3+Math.floor(rng()*2))%scale.length])%12;
      const beat=i*0.5;
      addNote(lead,b*BAR+beat*PPQ,PPQ*0.8,midiAt(pc,68),55,3);
    }
  }
  return{drums,bass,harmony,lead};
}

const STYLE_BUILDERS={rock:rockTracks,pop:popTracks,jazz:jazzTracks,blues:bluesTracks,funk:funkTracks,reggae:reggaeTracks,house:houseTracks,ambient:ambientTracks};

function buildChordsTrack(barChords){
  const track=[];
  let b=0;
  while(b<barChords.length){
    const ch=barChords[b];
    let span=1;
    while(b+span<barChords.length&&barChords[b+span].root===ch.root)span++;
    const tick=b*BAR,dur=span*BAR*0.96;
    ch.ints.map((iv,i)=>midiAt((ch.root+iv)%12,58+i*4)).sort((a,c)=>a-c).forEach(n=>addNote(track,tick,dur,n,60,4));
    b+=span;
  }
  return track;
}

function buildArrangement(){
  const chords=parseChords(document.getElementById("chords").value);
  const structure=parseStructure(document.getElementById("structure").value);
  const barSections=expandStructure(structure);
  const bars=barSections.length;
  const barChords=expandChordsToBars(chords,bars);
  const style=document.getElementById("style").value;
  const tempo=clamp(+document.getElementById("tempo").value||PRESETS[style].tempo,40,240);
  const seed=+document.getElementById("seed").value||1;
  const rng=rng32(seed);
  const tracks=STYLE_BUILDERS[style](barChords,barSections,rng);
  tracks.chords=buildChordsTrack(barChords);
  return{style,bars,tempo,seed,chords,barChords,barSections,tracks};
}

function summaryLines(arr){
  const lines=[`${arr.style.toUpperCase()} · ${arr.tempo} BPM · ${arr.bars} bars · seed ${arr.seed}`,""];
  for(let b=0;b<Math.min(arr.bars,30);b++)lines.push(`${String(b+1).padStart(3,"0")} | ${arr.barSections[b].padEnd(13)} | ${arr.barChords[b].name}`);
  if(arr.bars>30)lines.push(`... and ${arr.bars-30} more`);
  lines.push("",`Notes — Drums ${arr.tracks.drums.length} · Bass ${arr.tracks.bass.length} · Harmony ${arr.tracks.harmony.length} · Lead ${arr.tracks.lead.length} · Chords ${arr.tracks.chords.length}`);
  return lines.join("\n");
}

// MIDI export
function vlq(v){v=Math.max(0,Math.round(v));let a=[v&127];while(v>>=7)a.unshift((v&127)|128);return a}
function u32(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255]}
function txt(s){return Array.from(new TextEncoder().encode(s))}
function meta(tick,type,data){return{tick,order:-10,bytes:[255,type,...vlq(data.length),...data]}}

function trackChunk(name,program,channel,notes,endTick,tempo=null){let ev=[meta(0,3,txt(name))];if(tempo){const us=Math.round(60000000/tempo);ev.push(meta(0,0x51,[(us>>16)&255,(us>>8)&255,us&255]));ev.push(meta(0,0x58,[4,2,24,8]))}if(program!==null&&channel!==9)ev.push({tick:0,order:-5,bytes:[0xC0|channel,program]});for(const n of notes){ev.push({tick:n.tick,order:1,bytes:[0x90|n.channel,n.pitch,n.vel]});ev.push({tick:n.tick+n.dur,order:0,bytes:[0x80|n.channel,n.pitch,0]})}ev.push(meta(endTick,0x2F,[]));ev.sort((a,b)=>a.tick-b.tick||a.order-b.order);let body=[],last=0;for(const e of ev){body.push(...vlq(e.tick-last),...e.bytes);last=e.tick}return[77,84,114,107,...u32(body.length),...body]}

function midiBytes(arr){
  const p=PRESETS[arr.style];
  const chunks=[trackChunk("Conductor",null,0,[],arr.bars*BAR,arr.tempo)];
  if(document.getElementById("drums").checked)chunks.push(trackChunk("Drums",null,9,arr.tracks.drums,arr.bars*BAR));
  if(document.getElementById("bass").checked)chunks.push(trackChunk("Bass",p.bassProgram,1,arr.tracks.bass,arr.bars*BAR));
  if(document.getElementById("harmony").checked)chunks.push(trackChunk("Harmony",p.harmonyProgram,2,arr.tracks.harmony,arr.bars*BAR));
  if(document.getElementById("lead").checked)chunks.push(trackChunk("Lead",p.leadProgram,3,arr.tracks.lead,arr.bars*BAR));
  if(document.getElementById("chordsTrack").checked)chunks.push(trackChunk("Chords",0,4,arr.tracks.chords,arr.bars*BAR));
  const head=[77,84,104,100,0,0,0,6,0,1,(chunks.length>>8)&255,chunks.length&255,(PPQ>>8)&255,PPQ&255];
  return new Uint8Array([...head,...chunks.flat()]);
}

// Preview
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx}
function getNoiseBuffer(ctx){if(!noiseBuf){noiseBuf=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate);const d=noiseBuf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1}return noiseBuf}
function midiToFreq(p){return 440*Math.pow(2,(p-69)/12)}

function scheduleTone(ctx,master,when,dur,freq,vel,wave){const osc=ctx.createOscillator(),gain=ctx.createGain();osc.type=wave;osc.frequency.value=freq;const peak=clamp(vel/127,0.05,1)*0.22,t0=when,t1=when+Math.max(.05,dur);gain.gain.setValueAtTime(0,t0);gain.gain.linearRampToValueAtTime(peak,t0+0.008);gain.gain.linearRampToValueAtTime(0.0001,t1);osc.connect(gain);gain.connect(master);osc.start(t0);osc.stop(t1+0.02);activeNodes.push(osc)}

function scheduleDrum(ctx,master,when,pitch,vel){const v=clamp(vel/127,0.05,1);if(pitch===36){const osc=ctx.createOscillator(),gain=ctx.createGain();osc.type="sine";osc.frequency.setValueAtTime(150,when);osc.frequency.exponentialRampToValueAtTime(45,when+.12);gain.gain.setValueAtTime(v*.9,when);gain.gain.exponentialRampToValueAtTime(.001,when+.18);osc.connect(gain);gain.connect(master);osc.start(when);osc.stop(when+.2);activeNodes.push(osc)}else if(pitch===38||pitch===40){const src=ctx.createBufferSource();src.buffer=getNoiseBuffer(ctx);const bp=ctx.createBiquadFilter();bp.type="bandpass";bp.frequency.value=1800;bp.Q.value=.7;const gain=ctx.createGain();gain.gain.setValueAtTime(v*.7,when);gain.gain.exponentialRampToValueAtTime(.001,when+.12);src.connect(bp);bp.connect(gain);gain.connect(master);src.start(when);src.stop(when+.14);activeNodes.push(src)}else{const src=ctx.createBufferSource();src.buffer=getNoiseBuffer(ctx);const hp=ctx.createBiquadFilter();hp.type="highpass";hp.frequency.value=6000;const gain=ctx.createGain(),open=pitch===46,len=open?.14:.045;gain.gain.setValueAtTime(v*.5,when);gain.gain.exponentialRampToValueAtTime(.001,when+len);src.connect(hp);hp.connect(gain);gain.connect(master);src.start(when);src.stop(when+len+.02);activeNodes.push(src)}}

function setPreviewButton(playing){const b=document.getElementById("preview");b.textContent=playing?"■ Stop":"▶ Preview";b.dataset.playing=playing?"1":"0"}
function stopPreview(){const ctx=audioCtx;if(ctx){const now=ctx.currentTime;activeNodes.forEach(n=>{try{n.stop(now)}catch(e){}})}activeNodes=[];if(previewTimer){clearTimeout(previewTimer);previewTimer=null}setPreviewButton(false)}

function playPreview(){
  try{
    const arr=buildArrangement();
    arrangement=arr;
    document.getElementById("output").textContent=summaryLines(arr);
    const ctx=ensureAudio(),master=ctx.createGain();master.gain.value=.3;master.connect(ctx.destination);
    const secPerTick=60/(arr.tempo*PPQ),startAt=ctx.currentTime+0.1;
    const WAVE={bass:"triangle",harmony:"sine",lead:"sawtooth",chords:"sine"};
    const play=(name,checked)=>{if(!checked)return;arr.tracks[name].forEach(n=>{const when=startAt+n.tick*secPerTick,dur=n.dur*secPerTick;if(name==="drums")scheduleDrum(ctx,master,when,n.pitch,n.vel);else scheduleTone(ctx,master,when,dur,midiToFreq(n.pitch),n.vel,WAVE[name])})};
    play("drums",document.getElementById("drums").checked);
    play("bass",document.getElementById("bass").checked);
    play("harmony",document.getElementById("harmony").checked);
    play("lead",document.getElementById("lead").checked);
    play("chords",document.getElementById("chordsTrack").checked);
    const totalSec=arr.bars*BAR*secPerTick;
    setPreviewButton(true);
    document.getElementById("status").className="status ok";
    document.getElementById("status").textContent="🔊 Previewing…";
    previewTimer=setTimeout(()=>{stopPreview();document.getElementById("status").textContent="⏹️ Finished."},Math.ceil(totalSec*1000)+300);
  }catch(e){
    document.getElementById("status").className="status err";
    document.getElementById("status").textContent="❌ Error: "+e.message;
  }
}

function download(){
  stopPreview();
  try{
    const arr=buildArrangement();
    arrangement=arr;
    const bytes=midiBytes(arr);
    document.getElementById("output").textContent=summaryLines(arr);
    const blob=new Blob([bytes],{type:"audio/midi"}),a=document.createElement("a"),url=URL.createObjectURL(blob);
    a.href=url;a.download=`${arr.style}-${arr.tempo}bpm-seed${arr.seed}.mid`;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    document.getElementById("status").className="status ok";
    document.getElementById("status").textContent="✅ MIDI exported.";
  }catch(e){
    document.getElementById("status").className="status err";
    document.getElementById("status").textContent="❌ Error: "+e.message;
  }
}

function generate(){
  stopPreview();
  try{
    const arr=buildArrangement();
    arrangement=arr;
    document.getElementById("output").textContent=summaryLines(arr);
    document.getElementById("status").className="status ok";
    document.getElementById("status").textContent="✅ Generated.";
    const total=arr.tracks.drums.length+arr.tracks.bass.length+arr.tracks.harmony.length+arr.tracks.lead.length+arr.tracks.chords.length;
    document.getElementById("stats").textContent=`📊 ${total} notes generated`;
  }catch(e){
    document.getElementById("status").className="status err";
    document.getElementById("status").textContent="❌ Error: "+e.message;
  }
}

// Event listeners
document.getElementById("style").addEventListener("change",e=>document.getElementById("tempo").value=PRESETS[e.target.value].tempo);
document.getElementById("randomize").addEventListener("click",()=>{document.getElementById("seed").value=Math.floor(Math.random()*100000);generate()});
document.getElementById("surpriseMe").addEventListener("click",()=>{
  const presets=document.querySelectorAll('#progressionPreset option[data-chords]');
  const rp=presets[Math.floor(Math.random()*presets.length)];
  if(rp)document.getElementById('chords').value=rp.dataset.chords;
  const styles=document.getElementById('style').options;
  document.getElementById('style').value=styles[Math.floor(Math.random()*styles.length)].value;
  document.getElementById('tempo').value=Math.floor(Math.random()*120)+60;
  document.getElementById('seed').value=Math.floor(Math.random()*100000);
  generate();
});
document.getElementById("progressionPreset").addEventListener("change",e=>{
  const opt=e.target.selectedOptions[0];
  if(opt&&opt.dataset.chords){document.getElementById("chords").value=opt.dataset.chords;generate()}
  e.target.selectedIndex=0;
});
document.getElementById("generate").onclick=generate;
document.getElementById("download").onclick=download;
document.getElementById("preview").addEventListener("click",()=>{if(document.getElementById("preview").dataset.playing==="1")stopPreview();else playPreview()});

// Debounce
let timeout;
document.getElementById('chords').addEventListener('input',()=>{clearTimeout(timeout);timeout=setTimeout(generate,800)});
document.getElementById('structure').addEventListener('input',()=>{clearTimeout(timeout);timeout=setTimeout(generate,800)});

// Keyboard shortcuts
document.addEventListener('keydown',(e)=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();generate()}
  if(e.key===' '&&!e.target.matches('input, textarea, select')){e.preventDefault();document.getElementById('preview').click()}
});

generate();
</script>
