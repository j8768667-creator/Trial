<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chord Arranger Lite</title>
<style>
:root{--bg:#f6f7fb;--panel:#fff;--ink:#1b1f24;--muted:#667085;--accent:#4f46e5;--accent2:#eef2ff;--accent-hover:#3b32d1;--border:#dfe3ea;--ok:#177245;--err:#a52a2a}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.wrap{max-width:980px;margin:0 auto;padding:24px}
h1{font-size:clamp(28px,5vw,44px);margin:0 0 8px;font-weight:800;letter-spacing:-0.5px}
.sub{color:var(--muted);margin-bottom:24px;line-height:1.5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 8px 30px rgba(16,24,40,.05)}
label{display:block;font-weight:650;margin:12px 0 6px}
input,select,textarea,button{font:inherit}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:#fff;transition:border-color 0.15s ease}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{min-height:90px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
button{border:none;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;transition:all 0.15s ease;display:inline-flex;align-items:center;justify-content:center}
button:active{transform:scale(0.98)}
.primary{background:var(--accent);color:#fff}
.primary:hover{background:var(--accent-hover)}
.secondary{background:var(--accent2);color:var(--accent)}
.secondary:hover{background:var(--border)}
.status{margin-top:12px;color:var(--muted);min-height:22px;font-weight:500}
.status.ok{color:var(--ok)}
.status.err{color:var(--err)}
.sequence{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;line-height:1.55;white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:14px;min-height:260px;overflow:auto}
.help{font-size:13px;color:var(--muted);line-height:1.5}
.badge{display:inline-block;background:var(--accent2);color:var(--accent);padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:8px}
.checks{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.checks label{display:flex;align-items:center;gap:6px;margin:0;cursor:pointer;font-weight:500}
.checks input{width:auto;cursor:pointer}
.seedrow{display:flex;gap:8px;align-items:stretch}
.seedrow input{flex:1}
.seedrow button{padding:0 16px;white-space:nowrap}
@media(max-width:760px){.grid{grid-template-columns:1fr}.wrap{padding:16px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<span class="badge">Single-file MIDI generator</span>
<h1>Chord Arranger Lite</h1>
<div class="sub">Create synchronized MIDI arrangements with an exact selected-chords track, expanded progression presets and validated chord durations.</div>

<option data-chords="Dm | Bb | F | C">Melodic House</option>
<option data-chords="Am7 | Fmaj7 | Cmaj7 | G6">Chill Electronic</option>
</optgroup>

<optgroup label="Lo-fi &amp; R&amp;B">
<option data-chords="Dm9 | G9
