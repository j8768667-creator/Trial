<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chord Arranger Pro v4.1</title>
<style>
:root{--bg:#f6f7fb;--panel:#fff;--ink:#1b1f24;--muted:#667085;--accent:#4f46e5;--accent2:#eef2ff;--border:#dfe3ea;--ok:#177245;--err:#a52a2a}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:1100px;margin:auto;padding:24px}h1{font-size:clamp(28px,5vw,44px);margin:8px 0}.sub{color:var(--muted);margin-bottom:22px}
.grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:18px}.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 8px 30px rgba(16,24,40,.05)}
label{display:block;font-weight:700;margin:12px 0 6px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:#fff}textarea{min-height:96px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:12px;padding:12px 16px;font-weight:750;cursor:pointer}.primary{background:var(--accent);color:#fff}.secondary{background:var(--accent2);color:var(--accent)}button:disabled{opacity:.5;cursor:not-allowed}
.status{margin-top:12px;color:var(--muted);min-height:22px}.status.ok{color:var(--ok)}.status.err{color:var(--err)}.sequence{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;line-height:1.55;white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:14px;min-height:300px;max-height:560px;overflow:auto}.help,.stats{font-size:13px;color:var(--muted);line-height:1.5}.badge{display:inline-block;background:var(--accent2);color:var(--accent);padding:5px 12px;border-radius:999px;font-size:12px;font-weight:800}.checks{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}.checks label{display:flex;align-items:center;gap:6px;margin:0}.checks input{width:auto}.seedrow{display:flex;gap:8px}.seedrow input{flex:1}.seedrow button{white-space:nowrap}.meter{height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:8px}.meter>div{height:100%;width:0;background:var(--accent);transition:width .2s}
@media(max-width:780px){.grid,.row{grid-template-columns:1fr}.wrap{padding:16px}}
</style>
</head>
<body>
<div class="wrap">
<span class="badge">Validated multi-track MIDI generator</span>
<h1>Chord Arranger Pro <span style="font-size:14px;font-weight:500;color:var(--muted)">v4.1</span></h1>
<div class="sub">Distinct genre engines, reliable chord durations, separate chord-guide track and deterministic variations.</div>
<div class="grid">
<section class="card">
<label for="progressionPreset">Chord progression preset</label>
<select id="progressionPreset">
<option value="">Load a preset…</option>
<optgroup label="Pop">
<option data-chords="C | G | Am | F">Axis — I–V–vi–IV</option>
<option data-chords="C | Am | F | G">Doo-wop — I–vi–IV–V</option>
<option data-chords="Am | F | C | G">Minor pop — vi–IV–I–V</option>
<option data-chords="F | G | Em | Am">Emotional pop — IV–V–iii–vi</option>
<option data-chords="C(2) | G(2) | Am(2) | F(2)">Slow pop — two bars each</option>
</optgroup>
<optgroup label="Rock">
<option data-chords="E5 | G5 | A5 | E5">Classic power-rock</option>
<option data-chords="Am | G | F | G">Minor stadium rock</option>
<option data-chords="D | A | G | D">Open-chord rock</option>
<option data-chords="Em(2) | C | G | D">Anthem rock</option>
<option data-chords="A5 | C5 | D5 | A5">Garage rock</option>
</optgroup>
<optgroup label="Jazz">
<option data-chords="Dm7 | G7 | Cmaj7(2)">ii–V–I</option>
<option data-chords="Am7 | Dm7 | G7 | Cmaj7">vi–ii–V–I</option>
<option data-chords="Cmaj7 | A7 | Dm7 | G7">Rhythm turnaround</option>
<option data-chords="Dm7 | G7 | Cmaj7 | A7 | Dm7 | G7 | Cmaj7(2)">Extended turnaround</option>
<option data-chords="Fmaj7 | Fm7 | Em7 | A7 | Dm7 | G7 | Cmaj7(2)">Backdoor colour</option>
</optgroup>
<optgroup label="Blues">
<option data-chords="E7(4) | A7(2) | E7(2) | B7 | A7 | E7 | B7">12-bar blues in E</option>
<option data-chords="A7(4) | D7(2) | A7(2) | E7 | D7 | A7 | E7">12-bar blues in A</option>
<option data-chords="Am7(4) | Dm7(2) | Am7(2) | Em7 | Dm7 | Am7 | E7">Minor blues</option>
</optgroup>
<optgroup label="Dance / Electronic">
<option data-chords="Am | F | C | G">House anthem</option>
<option data-chords="Fm | Db | Ab | Eb">Deep house</option>
<option data-chords="Em(2) | C(2) | G(2) | D(2)">Progressive build</option>
<option data-chords="Dm | Bb | F | C">Festival minor</option>
</optgroup>
<optgroup label="Soul / Funk / Reggae">
<option data-chords="Em7 | A7 | Em7 | B7">Funk vamp</option>
<option data-chords="Cmaj7 | Am7 | Dm7 | G7">Soul turnaround</option>
<option data-chords="G | D | Em | C">Reggae pop</option>
<option data-chords="Am7(2) | Dm7(2)">Two-chord groove</option>
</optgroup>
<optgroup label="Ambient">
<option data-chords="Cmaj7(2) | Em7(2) | Am7(2) | Fmaj7(2)">Open ambient</option>
<option data-chords="Dm9(2) | Bbmaj7(2) | Fmaj7(2) | Cadd9(2)">Cinematic drift</option>
<option data-chords="Am9(4) | Fmaj7(4)">Minimal drone</option>
</optgroup>
</select>
<label for="chords">Chord progression</label>
<textarea id="chords">C | G | Am | F</textarea>
<div class="help">Use bars, commas or line breaks. Add <code>(N)</code> for a chord lasting N bars. Examples: <code>Am(2)</code>, <code>Cmaj7/E</code>, <code>F#7</code>, <code>G5</code>.</div>
<div class="row">
<div><label for="style">Genre</label><select id="style">
<option value="rock">Rock</option><option value="pop">Pop</option><option value="jazz">Jazz</option><option value="blues">Blues</option><option value="funk">Funk</option><option value="reggae">Reggae</option><option value="house">House</option><option value="ambient">Ambient</option>
</select></div>
<div><label for="tempo">Tempo (BPM)</label><input id="tempo" type="number" min="40" max="240" value="124"></div>
</div>
<label for="structure">Song structure</label>
<input id="structure" value="Intro:4, Verse:8, Chorus:8, Verse:8, Chorus:8, Bridge:4, Chorus:8, Outro:4">
<label for="seed">Variation seed</label>
<div class="seedrow"><input id="seed" type="number" value="7"><button class="secondary" id="randomize" type="button">Randomise</button><button class="secondary" id="surpriseMe" type="button">Surprise</button></div>
<label>Tracks</label>
<div class="checks"><label><input id="drums" type="checkbox" checked>Drums</label><label><input id="bass" type="checkbox" checked>Bass</label><label><input id="harmony" type="checkbox" checked>Harmony</label><label><input id="lead" type="checkbox" checked>Lead</label><label><input id="chordsTrack" type="checkbox" checked>Chord guide</label></div>
<div class="actions"><button class="primary" id="generate" type="button">Generate</button><button class="secondary" id="preview" type="button" data-playing="0">▶ Preview</button><button class="secondary" id="download" type="button">Export MIDI</button></div>
<div class="status" id="status">Ready.</div><div class="meter"><div id="progressFill"></div></div>
</section>
<section class="card"><label>Arrangement</label><div class="sequence" id="output">Press Generate.</div><div class="stats" id="stats"></div></section>
</div></div>
<script>
"use strict";
const PPQ=480, BAR=PPQ*4, NOTE={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const QUAL={
  "":{ints:[0,4,7],minor:false},m:{ints:[0,3,7],minor:true},"5":{ints:[0,7,12],minor:false},
  "6":{ints:[0,4,7,9],minor:false},m6:{ints:[0,3,7,9],minor:true},"7":{ints:[0,4,7,10],minor:false},m7:{ints:[0,3,7,10],minor:true},maj7:{ints:[0,4,7,11],minor:false},
  "9":{ints:[0,4,7,10,14],minor:false},m9:{ints:[0,3,7,10,14],minor:true},maj9:{ints:[0,4,7,11,14],minor:false},add9:{ints:[0,4,7,14],minor:false},madd9:{ints:[0,3,7,14],minor:true},
  sus2:{ints:[0,2,7],minor:false},sus4:{ints:[0,5,7],minor:false},dim:{ints:[0,3,6],minor:true},dim7:{ints:[0,3,6,9],minor:true},aug:{ints:[0,4,8],minor:false},m7b5:{ints:[0,3,6,10],minor:true}
};
const PRESETS={
 rock:{tempo:124,bassProgram:34,harmonyProgram:30,leadProgram:29,swing:0},pop:{tempo:110,bassProgram:33,harmonyProgram:25,leadProgram:81,swing:0},jazz:{tempo:92,bassProgram:32,harmonyProgram:0,leadProgram:66,swing:.16},blues:{tempo:104,bassProgram:33,harmonyProgram:27,leadProgram:28,swing:.18},funk:{tempo:102,bassProgram:36,harmonyProgram:28,leadProgram:65,swing:.04},reggae:{tempo:82,bassProgram:33,harmonyProgram:16,leadProgram:56,swing:0},house:{tempo:124,bassProgram:38,harmonyProgram:89,leadProgram:80,swing:0},ambient:{tempo:70,bassProgram:38,harmonyProgram:91,leadProgram:98,swing:0}
};
let arrangement=null,audioCtx=null,activeNodes=[],previewTimer=null,noiseBuf=null;
const $=id=>document.getElementById(id), clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
function rng32(seed){let a=seed>>>0;return()=>{a+=0x6D2B79F5;let t=a;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function pcOf(s){const m=/^([A-Ga-g])([#b]?)/.exec(s);if(!m)throw Error(`Invalid note: ${s}`);return(NOTE[m[1].toUpperCase()]+(m[2]==="#"?1:m[2]==="b"?-1:0)+12)%12}
function canonicalQuality(q){return q.replace(/^min/i,"m").replace(/^major/i,"maj").replace(/^minor/i,"m")}
function parseChord(raw){const x=raw.trim().replace(/\s+/g,"");const m=/^([A-Ga-g])([#b]?)([^\/]*)?(?:\/([A-Ga-g][#b]?))?$/.exec(x);if(!m)throw Error(`Cannot understand chord “${raw}”`);let q=canonicalQuality(m[3]||"");if(!(q in QUAL))throw Error(`Unsupported chord quality “${q}” in ${raw}`);const root=pcOf(m[1]+m[2]),def=QUAL[q];return{name:x,signature:`${root}:${q}:${m[4]||""}`,root,bass:m[4]?pcOf(m[4]):root,ints:def.ints.slice(),minor:def.minor,quality:q}}
function parseChordToken(token){const t=token.trim();const dm=/^(.*?)\((\d+)\)$/.exec(t);const chord=parseChord(dm?dm[1]:t);chord.duration=dm?clamp(Number(dm[2]),1,64):1;return chord}
function parseChords(text){let tokens=text.split(/[|,;\n]+/).map(s=>s.trim()).filter(Boolean);if(tokens.length===1&&/\s+/.test(tokens[0]))tokens=tokens[0].split(/\s+/).filter(Boolean);if(!tokens.length)throw Error("Enter at least one chord.");return tokens.map(parseChordToken)}
function parseStructure(text){const sections=text.split(",").map(s=>s.trim()).filter(Boolean).map(p=>{const m=/^(.+?):\s*(\d+)$/.exec(p);if(!m)throw Error(`Bad section: “${p}”. Use Name:bars.`);const bars=Number(m[2]);if(bars<1||bars>256)throw Error(`Invalid bar count in ${p}`);return{name:m[1].trim(),bars}});if(!sections.length)throw Error("Enter a song structure.");return sections}
function expandStructure(sections){return sections.flatMap(s=>Array(s.bars).fill(s.name))}
function expandChordsToBars(chords,totalBars){const out=[];let i=0;while(out.length<totalBars){const ch=chords[i%chords.length];for(let k=0;k<ch.duration&&out.length<totalBars;k++)out.push(ch);i++}return out}
function classify(name){const s=name.toLowerCase();const isChorus=/chorus|drop|hook/.test(s),isIntro=/intro/.test(s),isOutro=/outro/.test(s),isBridge=/bridge|break|middle/.test(s);return{isChorus,isIntro,isOutro,isBridge,energy:isChorus?1:isIntro?.45:isOutro?.5:isBridge?.65:.78}}
function midiAt(pc,target){let n=Math.round((target-pc)/12)*12+pc;return clamp(n,0,127)}
function addNote(track,tick,dur,pitch,vel,channel){track.push({tick:Math.max(0,Math.round(tick)),dur:Math.max(18,Math.round(dur)),pitch:clamp(Math.round(pitch),0,127),vel:clamp(Math.round(vel),1,127),channel})}
function human(rng,ticks=8){return Math.round((rng()-.5)*ticks)}
function chordVoicing(ch,target=56,maxNotes=5){const pcs=ch.ints.slice(0,maxNotes).map(iv=>(ch.root+iv)%12);const notes=pcs.map((pc,i)=>midiAt(pc,target+i*4)).sort((a,b)=>a-b);for(let i=1;i<notes.length;i++)while(notes[i]<=notes[i-1])notes[i]+=12;return notes.filter(n=>n<=127)}
function scaleFor(ch){return ch.minor?[0,2,3,5,7,8,10]:[0,2,4,5,7,9,11]}
function nearestPitchForPC(pc,previous,target=70){
  const centre=Number.isFinite(previous)?previous:target;
  let best=midiAt(pc,centre),bestDistance=Math.abs(best-centre);
  for(const candidate of [best-24,best-12,best,best+12,best+24]){
    if(candidate<48||candidate>88)continue;
    const distance=Math.abs(candidate-centre);
    if(distance<bestDistance){best=candidate;bestDistance=distance}
  }
  return best;
}
function melodyRhythm(style,chorus){
  const patterns={
    rock:chorus?[[0,.42],[.75,.28],[1.5,.34],[2,.42],[2.75,.28],[3.5,.38]]:[[0,.48],[1,.34],[2,.48],[3.25,.42]],
    pop:chorus?[[0,.48],[.5,.28],[1,.42],[1.75,.32],[2.5,.42],[3,.28],[3.5,.38]]:[[.5,.44],[1.5,.34],[2.5,.44],[3.25,.34]],
    jazz:[[0,.42],[2/3,.25],[1.5,.34],[2,.42],[2+2/3,.25],[3.5,.34]],
    blues:[[0,.42],[2/3,.26],[1.5,.32],[2,.42],[2+2/3,.26],[3.5,.36]],
    funk:[[.5,.18],[1,.18],[1.75,.20],[2.5,.18],[3.25,.20],[3.75,.16]],
    reggae:[[.75,.42],[2.25,.48],[3.25,.38]],
    house:chorus?Array.from({length:8},(_,i)=>[i*.5,.28]):[[.5,.28],[1.5,.28],[2.5,.28],[3.5,.28]],
    ambient:[[.5,.85],[1.75,.72],[3,.82]]
  };
  return patterns[style]||patterns.pop;
}
function buildSyncedLead(chords,sections,style,rng){
  const lead=[];
  let previous=null;
  for(let b=0;b<chords.length;b++){
    const chord=chords[b],next=chords[Math.min(b+1,chords.length-1)],cls=classify(sections[b]),base=b*BAR;
    if(cls.isIntro&&style!=="ambient"&&style!=="house"&&b%2===1)continue;
    const rhythm=melodyRhythm(style,cls.isChorus);
    const chordPCs=[...new Set(chord.ints.slice(0,4).map(iv=>(chord.root+iv)%12))];
    const scalePCs=[...new Set(scaleFor(chord).map(iv=>(chord.root+iv)%12))];
    rhythm.forEach(([beat,len],i)=>{
      const strong=Math.abs(beat-Math.round(beat))<.001&&(Math.round(beat)%2===0);
      let pc;
      if(strong||i===0){
        const preferred=i===0?[chord.root,(chord.root+(chord.minor?3:4))%12,(chord.root+7)%12]:chordPCs;
        pc=preferred[(b+i+Math.floor(rng()*preferred.length))%preferred.length];
      }else if(i===rhythm.length-1&&next.signature!==chord.signature){
        const targets=[next.root,(next.root+(next.minor?3:4))%12];
        const target=targets[Math.floor(rng()*targets.length)];
        pc=scalePCs.reduce((best,candidate)=>{
          const d=Math.min((candidate-target+12)%12,(target-candidate+12)%12);
          const bd=Math.min((best-target+12)%12,(target-best+12)%12);
          return d<bd?candidate:best;
        },scalePCs[0]);
      }else{
        const candidates=rng()<.72?chordPCs:scalePCs;
        pc=candidates[(i+b+Math.floor(rng()*candidates.length))%candidates.length];
      }
      let pitch=nearestPitchForPC(pc,previous,style==="house"?74:style==="ambient"?68:71);
      if(previous!==null&&Math.abs(pitch-previous)>7){
        const alternatives=[pitch-12,pitch+12].filter(n=>n>=48&&n<=88);
        if(alternatives.length)pitch=alternatives.sort((a,c)=>Math.abs(a-previous)-Math.abs(c-previous))[0];
      }
      const maxDur=Math.max(PPQ*.12,BAR-beat*PPQ-12);
      addNote(lead,base+beat*PPQ,Math.min(len*PPQ,maxDur),pitch,clamp(68+(cls.isChorus?10:0)+(strong?7:0),1,127),3);
      previous=pitch;
    });
  }
  return lead;
}
function makeTracks(){return{drums:[],bass:[],harmony:[],lead:[]}}
function rockTracks(chords,sections,rng){const t=makeTracks();for(let b=0;b<chords.length;b++){const c=chords[b],x=classify(sections[b]),base=b*BAR,root=midiAt(c.bass,36),fifth=midiAt((c.root+7)%12,43);[0,2].forEach(q=>addNote(t.drums,base+q*PPQ,70,36,112,9));if(x.isChorus)[1.5,3.5].forEach(q=>addNote(t.drums,base+q*PPQ,65,36,96,9));[1,3].forEach(q=>addNote(t.drums,base+q*PPQ,75,38,118,9));for(let i=0;i<8;i++)addNote(t.drums,base+i*PPQ/2,28,42,52+(i%2?8:18),9);if((x.isChorus&&b%4===0)||b===0)addNote(t.drums,base,110,49,118,9);const rhythm=x.isChorus?[0,.5,1,1.5,2,2.5,3,3.5]:[0,1,2,3];rhythm.forEach((q,i)=>addNote(t.bass,base+q*PPQ,PPQ*(x.isChorus?.38:.78),i%4===3?fifth:root,90+(i===0?8:0),1));const power=[midiAt(c.root,48),midiAt((c.root+7)%12,55),midiAt(c.root,60)];(x.isChorus?[0,.5,1.5,2,2.5,3.5]:[0,1.5,2,3.5]).forEach((q,i)=>power.forEach((n,j)=>addNote(t.harmony,base+q*PPQ+j*7,PPQ*.34,n,78+(i===0?10:0),2)));const pent=c.minor?[0,3,5,7,10]:[0,2,4,7,9];[0,.75,1.5,2.5,3.25].forEach((q,i)=>{if(x.isIntro&&i>2)return;const iv=pent[(i+b+Math.floor(rng()*2))%pent.length];addNote(t.lead,base+q*PPQ+human(rng,6),PPQ*(i===4?.55:.32),midiAt((c.root+iv)%12,70),76+(x.isChorus?10:0),3)});}return t}
function popTracks(chords,sections,rng){const t=makeTracks();for(let b=0;b<chords.length;b++){const c=chords[b],x=classify(sections[b]),base=b*BAR,root=midiAt(c.bass,38),fifth=midiAt((c.root+7)%12,43);[0,2,2.75].forEach((q,i)=>{if(i===2&&!x.isChorus)return;addNote(t.drums,base+q*PPQ,60,36,98+(x.isChorus?8:0),9)});[1,3].forEach(q=>addNote(t.drums,base+q*PPQ,65,38,104,9));for(let i=0;i<8;i++)addNote(t.drums,base+i*PPQ/2,24,42,43+(i%2?8:14),9);[0,1.5,2,3.5].forEach((q,i)=>addNote(t.bass,base+q*PPQ,PPQ*.42,i===3?fifth:root,82+(i===0?8:0),1));const vo=chordVoicing(c,54,4);const pattern=x.isChorus?[0,.5,1,1.5,2,2.5,3,3.5]:[0,1,2,3];pattern.forEach((q,i)=>vo.forEach((n,j)=>addNote(t.harmony,base+q*PPQ+j*10,PPQ*(x.isChorus?.30:.72),n,62+(x.isChorus?14:0),2)));const sc=scaleFor(c),hook=x.isChorus?[0,.5,1,1.75,2.5,3,3.5]:[.5,1.5,2.75];hook.forEach((q,i)=>addNote(t.lead,base+q*PPQ,PPQ*(i%3===0?.5:.3),midiAt((c.root+sc[(i*2+b+Math.floor(rng()*2))%sc.length])%12,72),74+(x.isChorus?8:0),3));}return t}
function jazzTracks(chords,sections,rng){const t=makeTracks();for(let b=0;b<chords.length;b++){const c=chords[b],base=b*BAR,root=midiAt(c.bass,36),next=chords[(b+1)%chords.length],nextRoot=midiAt(next.bass,36);for(let i=0;i<4;i++){addNote(t.drums,base+i*PPQ,35,51,63+(i===0?8:0),9);addNote(t.drums,base+i*PPQ+Math.round(PPQ*2/3),30,51,47,9)}[1,3].forEach(q=>addNote(t.drums,base+q*PPQ,45,38,54,9));if(b%2===0)addNote(t.drums,base,55,36,58,9);const walk=[root,midiAt((c.root+(c.minor?3:4))%12,40),midiAt((c.root+7)%12,43),nextRoot+(nextRoot>root? -1:1)];walk.forEach((n,i)=>addNote(t.bass,base+i*PPQ,PPQ*.88,n,76+(i===0?8:0),1));const vo=chordVoicing(c,56,5);[0,2.5].forEach((q,idx)=>vo.forEach((n,j)=>addNote(t.harmony,base+q*PPQ+j*5,PPQ*(idx===0?1.35:.9),n,56+(idx?5:0),2)));const sc=scaleFor(c).concat([10]);for(let i=0;i<8;i++){if(rng()<.22)continue;const q=i*.5+(i%2? .12:0);addNote(t.lead,base+q*PPQ,PPQ*(rng()<.2?.65:.28),midiAt((c.root+sc[(i*3+b+Math.floor(rng()*3))%sc.length])%12,69),68+Math.floor(rng()*14),3)}}return t}

function funkTracks(chords,sections,rng){const t=makeTracks();for(let b=0;b<chords.length;b++){const c=chords[b],x=classify(sections[b]),base=b*BAR,root=midiAt(c.bass,34),oct=root+12;[0,.75,2,2.75].forEach(q=>addNote(t.drums,base+q*PPQ,45,36,99,9));[1,3].forEach(q=>addNote(t.drums,base+q*PPQ,55,38,110,9));for(let i=0;i<16;i++){if(i%4===2&&rng()<.45)continue;addNote(t.drums,base+i*PPQ/4,18,42,38+(i%4===0?18:0),9)}const hits=x.isChorus?[0,.5,1.25,1.75,2.5,3,3.5]:[0,.75,1.5,2.75,3.25];hits.forEach((q,i)=>addNote(t.bass,base+q*PPQ,PPQ*.18,i%3===1?oct:root,88+(i===0?10:0),1));const vo=chordVoicing(c,58,4);[.25,1.5,2.25,3.5].forEach(q=>vo.forEach(n=>addNote(t.harmony,base+q*PPQ,PPQ*.12,n,72,2)));const pent=c.minor?[0,3,5,7,10]:[0,2,4,7,9];[.5,1,1.75,2.5,3.25,3.75].forEach((q,i)=>addNote(t.lead,base+q*PPQ,PPQ*.18,midiAt((c.root+pent[(i+b)%pent.length])%12,72),74,3));}return t}
function reggaeTracks(chords,sections,rng){const t=makeTracks();for(let b=0;b<chords.length;b++){const c=chords[b],x=classify(sections[b]),base=b*BAR,root=midiAt(c.bass,38),fifth=midiAt((c.root+7)%12,43);addNote(t.drums,base+2*PPQ,60,36,88,9);addNote(t.drums,base+2*PPQ,60,38,98,9);for(let i=0;i<8;i++)addNote(t.drums,base+i*PPQ/2,24,i%2?46:42,42+(i%2?8:0),9);[0,1.5,2.5].forEach((q,i)=>addNote(t.bass,base+q*PPQ,PPQ*(i===0?.95:.55),i===2?fifth:root,84,1));const vo=chordVoicing(c,60,4);[.5,1.5,2.5,3.5].forEach(q=>vo.forEach(n=>addNote(t.harmony,base+q*PPQ,PPQ*.20,n,68+(x.isChorus?8:0),2)));if(!x.isIntro){const sc=scaleFor(c);[.75,2.25,3.25].forEach((q,i)=>addNote(t.lead,base+q*PPQ,PPQ*.45,midiAt((c.root+sc[(i*2+b+Math.floor(rng()*2))%sc.length])%12,69),68,3));}}return t}
function houseTracks(chords,sections,rng){const t=makeTracks();for(let b=0;b<chords.length;b++){const c=chords[b],x=classify(sections[b]),base=b*BAR,root=midiAt(c.bass,36),oct=root+12;for(let i=0;i<4;i++)addNote(t.drums,base+i*PPQ,70,36,112,9);[1,3].forEach(q=>addNote(t.drums,base+q*PPQ,55,38,94,9));for(let i=0;i<8;i++)addNote(t.drums,base+(i+.5)*PPQ/2,24,42,52+(i%2?8:0),9);[.5,1.5,2.5,3.5].forEach((q,i)=>addNote(t.bass,base+q*PPQ,PPQ*.36,i===3&&x.isChorus?oct:root,92,1));const vo=chordVoicing(c,56,5);vo.forEach(n=>addNote(t.harmony,base,PPQ*3.8,n,58+(x.isChorus?10:0),2));const arp=c.ints.slice(0,4);for(let i=0;i<16;i++){if(!x.isChorus&&i%2)continue;addNote(t.lead,base+i*PPQ/4,PPQ*.18,midiAt((c.root+arp[(i+b)%arp.length])%12,74+(i%8===7?12:0)),66+(i%4===0?12:0),3)}}return t}
function ambientTracks(chords,sections,rng){const t=makeTracks();for(let b=0;b<chords.length;b++){const c=chords[b],x=classify(sections[b]),base=b*BAR,root=midiAt(c.bass,34);if(b%2===0)addNote(t.drums,base,80,36,34,9);if(b%4===2)addNote(t.drums,base+2.5*PPQ,60,46,28,9);addNote(t.bass,base,PPQ*3.9,root,52,1);const vo=chordVoicing(c,50,5);vo.forEach((n,i)=>addNote(t.harmony,base+i*20,PPQ*3.85,n,40+i*4+(x.isChorus?6:0),2));const sc=scaleFor(c);[.5,1.75,3].forEach((q,i)=>{if(rng()<.25)return;addNote(t.lead,base+q*PPQ,PPQ*(.7+rng()*.7),midiAt((c.root+sc[(i*3+b)%sc.length])%12,68),48+(x.isChorus?6:0),3)});}return t}
const STYLE_BUILDERS={rock:rockTracks,pop:popTracks,jazz:jazzTracks,blues:bluesTracks,funk:funkTracks,reggae:reggaeTracks,house:houseTracks,ambient:ambientTracks};
function buildChordsTrack(barChords){const out=[];let b=0;while(b<barChords.length){const c=barChords[b];let span=1;while(b+span<barChords.length&&barChords[b+span].signature===c.signature)span++;chordVoicing(c,58,6).forEach((n,i)=>addNote(out,b*BAR+i*4,span*BAR*.96,n,58,4));b+=span}return out}
function buildArrangement(){const chords=parseChords($("chords").value),sections=parseStructure($("structure").value),barSections=expandStructure(sections),barChords=expandChordsToBars(chords,barSections.length),style=$("style").value,tempo=clamp(Number($("tempo").value)||PRESETS[style].tempo,40,240),seed=Number($("seed").value)||1,rng=rng32(seed),tracks=STYLE_BUILDERS[style](barChords,barSections,rng);tracks.lead=buildSyncedLead(barChords,barSections,style,rng32(seed^0x9E3779B9));tracks.chords=buildChordsTrack(barChords);return{style,bars:barSections.length,tempo,seed,chords,barChords,barSections,tracks}}
function summaryLines(a){const out=[`${a.style.toUpperCase()} · ${a.tempo} BPM · ${a.bars} bars · seed ${a.seed}`,""];for(let b=0;b<Math.min(a.bars,40);b++)out.push(`${String(b+1).padStart(3,"0")} | ${a.barSections[b].padEnd(13)} | ${a.barChords[b].name}`);if(a.bars>40)out.push(`… and ${a.bars-40} more bars`);out.push("",`Notes — Drums ${a.tracks.drums.length} · Bass ${a.tracks.bass.length} · Harmony ${a.tracks.harmony.length} · Lead ${a.tracks.lead.length} · Chord guide ${a.tracks.chords.length}`);return out.join("\n")}
function vlq(v){v=Math.max(0,Math.round(v));const a=[v&127];while(v>>=7)a.unshift((v&127)|128);return a}function u32(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255]}function txt(s){return Array.from(new TextEncoder().encode(s))}function meta(tick,type,data){return{tick,order:-10,bytes:[255,type,...vlq(data.length),...data]}}
function trackChunk(name,program,channel,notes,endTick,tempo=null){const ev=[meta(0,3,txt(name))];if(tempo){const us=Math.round(60000000/tempo);ev.push(meta(0,0x51,[(us>>16)&255,(us>>8)&255,us&255]),meta(0,0x58,[4,2,24,8]))}if(program!==null&&channel!==9)ev.push({tick:0,order:-5,bytes:[0xC0|channel,program]});for(const n of notes){ev.push({tick:n.tick,order:1,bytes:[0x90|channel,n.pitch,n.vel]},{tick:n.tick+n.dur,order:0,bytes:[0x80|channel,n.pitch,0]})}ev.push(meta(endTick,0x2F,[]));ev.sort((a,b)=>a.tick-b.tick||a.order-b.order);const body=[];let last=0;for(const e of ev){body.push(...vlq(e.tick-last),...e.bytes);last=e.tick}return[77,84,114,107,...u32(body.length),...body]}
function midiBytes(a){const p=PRESETS[a.style],chunks=[trackChunk("Conductor",null,0,[],a.bars*BAR,a.tempo)];if($("drums").checked)chunks.push(trackChunk("Drums",null,9,a.tracks.drums,a.bars*BAR));if($("bass").checked)chunks.push(trackChunk("Bass",p.bassProgram,1,a.tracks.bass,a.bars*BAR));if($("harmony").checked)chunks.push(trackChunk("Harmony",p.harmonyProgram,2,a.tracks.harmony,a.bars*BAR));if($("lead").checked)chunks.push(trackChunk("Lead",p.leadProgram,3,a.tracks.lead,a.bars*BAR));if($("chordsTrack").checked)chunks.push(trackChunk("Chord Guide",0,4,a.tracks.chords,a.bars*BAR));const head=[77,84,104,100,0,0,0,6,0,1,(chunks.length>>8)&255,chunks.length&255,(PPQ>>8)&255,PPQ&255];return new Uint8Array([...head,...chunks.flat()])}
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx}function getNoiseBuffer(ctx){if(!noiseBuf){noiseBuf=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate);const d=noiseBuf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1}return noiseBuf}function midiToFreq(p){return 440*2**((p-69)/12)}
function scheduleTone(ctx,master,when,dur,freq,vel,wave){const o=ctx.createOscillator(),g=ctx.createGain();o.type=wave;o.frequency.value=freq;const peak=clamp(vel/127,.05,1)*.18,t1=when+Math.max(.04,dur);g.gain.setValueAtTime(0,when);g.gain.linearRampToValueAtTime(peak,when+.008);g.gain.exponentialRampToValueAtTime(.0001,t1);o.connect(g);g.connect(master);o.start(when);o.stop(t1+.02);activeNodes.push(o)}
function scheduleDrum(ctx,master,when,pitch,vel){const v=vel/127;if(pitch===36){const o=ctx.createOscillator(),g=ctx.createGain();o.type="sine";o.frequency.setValueAtTime(145,when);o.frequency.exponentialRampToValueAtTime(48,when+.11);g.gain.setValueAtTime(v*.8,when);g.gain.exponentialRampToValueAtTime(.001,when+.17);o.connect(g);g.connect(master);o.start(when);o.stop(when+.19);activeNodes.push(o);return}const src=ctx.createBufferSource(),f=ctx.createBiquadFilter(),g=ctx.createGain();src.buffer=getNoiseBuffer(ctx);f.type=pitch===38?"bandpass":"highpass";f.frequency.value=pitch===38?1800:6000;const len=pitch===46||pitch===49?.18:.06;g.gain.setValueAtTime(v*.45,when);g.gain.exponentialRampToValueAtTime(.001,when+len);src.connect(f);f.connect(g);g.connect(master);src.start(when);src.stop(when+len+.02);activeNodes.push(src)}
function setPreviewButton(on){$("preview").textContent=on?"■ Stop":"▶ Preview";$("preview").dataset.playing=on?"1":"0"}function stopPreview(){if(audioCtx){const now=audioCtx.currentTime;activeNodes.forEach(n=>{try{n.stop(now)}catch{}})}activeNodes=[];if(previewTimer)clearTimeout(previewTimer);previewTimer=null;setPreviewButton(false)}
function render(a,msg="Generated."){arrangement=a;$("output").textContent=summaryLines(a);const total=Object.values(a.tracks).reduce((n,x)=>n+x.length,0);$("stats").textContent=`${total.toLocaleString()} note events · ${a.bars} bars`;$("status").className="status ok";$("status").textContent=msg;$("progressFill").style.width="100%";setTimeout(()=>$("progressFill").style.width="0%",350)}
function generate(){stopPreview();try{render(buildArrangement(),"Generated successfully.")}catch(e){$("status").className="status err";$("status").textContent=`Error: ${e.message}`}}
function playPreview(){stopPreview();try{const a=buildArrangement();render(a,"Previewing…");const ctx=ensureAudio(),master=ctx.createGain();master.gain.value=.28;master.connect(ctx.destination);const spt=60/(a.tempo*PPQ),start=ctx.currentTime+.08,waves={bass:"triangle",harmony:a.style==="rock"?"square":"sine",lead:a.style==="ambient"?"sine":"sawtooth",chords:"sine"};for(const name of ["drums","bass","harmony","lead","chords"]){const id=name==="chords"?"chordsTrack":name;if(!$(id).checked)continue;for(const n of a.tracks[name]){const when=start+n.tick*spt,dur=n.dur*spt;if(name==="drums")scheduleDrum(ctx,master,when,n.pitch,n.vel);else scheduleTone(ctx,master,when,dur,midiToFreq(n.pitch),n.vel,waves[name])}}setPreviewButton(true);previewTimer=setTimeout(()=>{stopPreview();$("status").textContent="Preview finished."},a.bars*BAR*spt*1000+250)}catch(e){$("status").className="status err";$("status").textContent=`Error: ${e.message}`}}

$("style").addEventListener("change",e=>{$("tempo").value=PRESETS[e.target.value].tempo;generate()});$("randomize").addEventListener("click",()=>{$("seed").value=Math.floor(Math.random()*1000000);generate()});$("surpriseMe").addEventListener("click",()=>{const p=[...document.querySelectorAll("#progressionPreset option[data-chords]")],styles=[...$("style").options];$("chords").value=p[Math.floor(Math.random()*p.length)].dataset.chords;$("style").value=styles[Math.floor(Math.random()*styles.length)].value;$("tempo").value=PRESETS[$("style").value].tempo+Math.floor(Math.random()*17)-8;$("seed").value=Math.floor(Math.random()*1000000);generate()});$("progressionPreset").addEventListener("change",e=>{const o=e.target.selectedOptions[0];if(o?.dataset.chords){$("chords").value=o.dataset.chords;generate()}e.target.selectedIndex=0});$("generate").onclick=generate;$("download").onclick=download;$("preview").onclick=()=>$("preview").dataset.playing==="1"?stopPreview():playPreview();
let debounce;["chords","structure"].forEach(id=>$(id).addEventListener("input",()=>{clearTimeout(debounce);debounce=setTimeout(generate,650)}));document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();generate()}if(e.key===" "&&!e.target.matches("input,textarea,select,button")){e.preventDefault();$("preview").click()}});generate();
